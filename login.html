<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>📅 門市排班神器 - 登入大門</title>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="config.js"></script>

  <style>
    body { font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", sans-serif; background-color: #f1f3f4; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #202124; }
    .login-card { background: white; padding: 40px 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 380px; text-align: center; }
    .app-logo { font-size: 50px; margin-bottom: 10px; display: block; }
    .app-title { font-size: 22px; font-weight: 900; color: #1a73e8; margin-bottom: 30px; letter-spacing: 1px; }
    .input-group { text-align: left; margin-bottom: 20px; }
    .input-group label { display: block; font-size: 13px; font-weight: bold; color: #5f6368; margin-bottom: 8px; }
    .input-group select, .input-group input { width: 100%; padding: 14px 15px; border: 1.5px solid #dadce0; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; transition: 0.2s; background: #f8f9fa; }
    .input-group select:focus, .input-group input:focus { border-color: #1a73e8; background: white; box-shadow: 0 0 0 3px rgba(26,115,232,0.1); }
    .btn-login { width: 100%; padding: 16px; background: #1a73e8; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 10px rgba(26,115,232,0.3); transition: 0.2s; }
    .btn-login:active { transform: scale(0.98); box-shadow: none; }
    .btn-login:disabled { background: #9aa0a6; cursor: not-allowed; }
    .error-msg { color: #d93025; font-size: 13px; font-weight: bold; margin-bottom: 15px; display: none; background: #fce8e6; padding: 12px; border-radius: 10px; border: 1px solid #d93025; }
    #loadingOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; color: #1a73e8; font-weight: bold; }
    .spinner { border: 4px solid rgba(26,115,232,0.2); border-top: 4px solid #1a73e8; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="loadingOverlay"><div class="spinner"></div><div id="loadingText">載入門市資料中...</div></div>

  <div class="login-card">
      <span class="app-logo">📅</span>
      <div class="app-title">門市排班神器</div>

      <div class="error-msg" id="errorMsg"></div>

      <div class="input-group">
          <label>🏪 選擇所屬門市</label>
          <select id="loginStore">
              <option value="">載入中...</option>
          </select>
      </div>

      <div class="input-group">
          <label>🪪 身分證字號 (帳號)</label>
          <input type="text" id="loginId" placeholder="例：A123456789" style="text-transform: uppercase;">
      </div>

      <div class="input-group">
          <label>🔑 登入密碼</label>
          <input type="password" id="loginPw" placeholder="預設 123456">
      </div>

      <button class="btn-login" id="loginBtn" onclick="handleLogin()">登入系統</button>
      
      <p style="font-size: 12px; color: #9aa0a6; margin-top: 25px;">
        若無法登入，請洽詢門市管理員。
      </p>
  </div>

  <script>
    // 進入頁面先抓門市清單
    window.onload = async () => {
        document.getElementById('loadingOverlay').style.display = 'flex';
        try {
            // 從 Firebase settings/globalConfig 抓取門市清單
            const snap = await window.db.collection('settings').doc('globalConfig').get();
            let stores = (snap.exists && snap.data().stores) ? snap.data().stores : [];
            
            let sel = document.getElementById('loginStore');
            if (stores.length > 0) {
                sel.innerHTML = '<option value="">-- 請選擇門市 --</option>';
                stores.forEach(s => { sel.innerHTML += `<option value="${s}">${s}</option>`; });
                // 回填上次選擇的店
                let last = localStorage.getItem('lastStore');
                if(last && stores.includes(last)) sel.value = last;
            } else {
                sel.innerHTML = '<option value="">尚未建立門市</option>';
            }
        } catch (e) {
            showError("資料庫連線異常");
        }
        document.getElementById('loadingOverlay').style.display = 'none';
    };

    function showError(msg) {
        let errDiv = document.getElementById('errorMsg');
        errDiv.innerText = msg;
        errDiv.style.display = 'block';
    }

    async function handleLogin() {
        let store = document.getElementById('loginStore').value;
        let idNumber = document.getElementById('loginId').value.trim().toUpperCase();
        let pw = document.getElementById('loginPw').value.trim();
        let btn = document.getElementById('loginBtn');

        if (!store || !idNumber || !pw) return showError("請完整填寫所有欄位！");

        document.getElementById('errorMsg').style.display = 'none';
        btn.disabled = true;
        btn.innerText = "驗證身分中...";

        try {
            // 🔍 搜尋該門市下，idNumber 符合的員工 (作法 B)
            const empRef = window.db.collection('stores').doc(store).collection('employees');
            const querySnap = await empRef.where('idNumber', '==', idNumber).get();

            if (querySnap.empty) {
                showError("身分證字號錯誤或該員不在本門市。");
                resetBtn(); return;
            }

            let userDoc = querySnap.docs[0];
            let userData = userDoc.data();

            // 🔑 驗證密碼：如果資料庫沒存 password 欄位，預設為 123456
            let correctPw = userData.password || "123456";
            if (pw !== correctPw) {
                showError("密碼錯誤！");
                resetBtn(); return;
            }

            if (userData.status === '離職') {
                showError("此帳號已停用。");
                resetBtn(); return;
            }

            // 🎉 登入成功！發放通行證至 localStorage
            localStorage.setItem('currentUser', userDoc.id); // 存姓名
            localStorage.setItem('userRole', userData.role);  // 存權限數字 (1, 2, 3)
            localStorage.setItem('lastStore', store);        // 存所屬門市

            btn.innerText = "登入成功！跳轉中...";
            btn.style.background = "#34a853";

            setTimeout(() => { window.location.href = "index.html"; }, 800);

        } catch (e) {
            showError("系統錯誤: " + e.message);
            resetBtn();
        }
    }

    function resetBtn() {
        let btn = document.getElementById('loginBtn');
        btn.disabled = false;
        btn.innerText = "登入系統";
    }
  </script>
</body>
</html>
